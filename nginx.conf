server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # compresión gzip — reduce hasta un 70% el tamaño de JS/CSS en tránsito
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # SPA: todas las rutas sirven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # assets con hash en el nombre → cache agresivo de 1 año
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
