# CI — corre en cada PR hacia main y en cada push directo a main.
# Bloquea el merge si lint o build fallan.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del PR/push
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Instala Node 20 y activa el cache de npm
      #    (la segunda vez que corra no vuelve a descargar paquetes)
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Instala dependencias de forma reproducible (usa package-lock.json)
      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      # 4. ESLint — falla si hay errores de linting
      - name: Lint
        run: npm run lint
        working-directory: frontend

      # 5. Vite build — falla si hay imports rotos, errores de sintaxis, etc.
      - name: Build
        run: npm run build
        working-directory: frontend
